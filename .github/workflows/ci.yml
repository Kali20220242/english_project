name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/neontalk
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/neontalk

      - name: Typecheck
        run: npm run typecheck
